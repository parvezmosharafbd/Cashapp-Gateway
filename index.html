<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Mila69</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300D632'/><text x='50' y='72' font-size='65' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'>$</text></svg>" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  font-family: 'Outfit', sans-serif;
}

body {
  min-height: 100dvh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 16px;
  overflow-x: hidden;
}

/* ── Premium Glass Korean-style Background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%23FFF5F0;stop-opacity:1" /><stop offset="50%" style="stop-color:%23F5F0E8;stop-opacity:1" /><stop offset="100%" style="stop-color:%23E8F5E0;stop-opacity:1" /></linearGradient><filter id="blur1"><feGaussianBlur in="SourceGraphic" stdDeviation="8" /></filter></defs><rect width="1080" height="1920" fill="url(%23grad1)"/><circle cx="200" cy="300" r="400" fill="%23FFE5D9" opacity="0.4" filter="url(%23blur1)"/><circle cx="900" cy="600" r="350" fill="%23E0F5D8" opacity="0.35" filter="url(%23blur1)"/><circle cx="400" cy="1200" r="380" fill="%23FFF0E6" opacity="0.3" filter="url(%23blur1)"/><path d="M 0 800 Q 270 700 540 750 T 1080 800 L 1080 1000 Q 540 1100 0 1000 Z" fill="%23F0F8E8" opacity="0.25"/></svg>');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  z-index: -1;
}

/* ── Premium Glass Card ── */
.card {
  width: 100%;
  max-width: 400px;
  /* Crystal-clear glass: high white opacity with strong blur */
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
  -webkit-backdrop-filter: blur(32px) saturate(200%) brightness(1.08);
  border-radius: 30px;
  /* Multi-layer border for depth */
  border: 1px solid rgba(255, 255, 255, 0.55);
  box-shadow:
    0 2px 0 rgba(255,255,255,0.8) inset,       /* top highlight */
    0 -1px 0 rgba(255,255,255,0.3) inset,      /* bottom inner */
    0 32px 80px rgba(0,0,0,0.28),              /* deep shadow */
    0 8px 24px rgba(0,0,0,0.15);              /* soft shadow */
  overflow: hidden;
  animation: fadeIn .45s cubic-bezier(.22,1,.36,1);
  position: relative;
}

/* Subtle shimmer line at top */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.9) 40%,
    rgba(0,214,50,0.6) 60%,
    transparent 100%
  );
  z-index: 2;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(20px) scale(.98); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.drag-bar {
  width: 38px; height: 4px;
  background: rgba(255,255,255,0.55);
  border-radius: 4px;
  margin: 14px auto 0;
}

/* ── STEP 1 ── */
.s1-body { padding: 20px 22px 28px; }

.profile-row {
  display: flex; align-items: center; gap: 13px; margin-bottom: 18px;
}
.p-avatar {
  width: 50px; height: 50px;
  background: linear-gradient(135deg, #00D632, #00a826);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 900; color: white; flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(0,214,50,0.45), 0 1px 0 rgba(255,255,255,0.4) inset;
}
.p-info .p-name {
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-weight: 800;
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,0.25);
}
.p-info .p-tag {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 4px;
  font-size: 11px; font-weight: 600;
  color: #fff;
  background: rgba(0,214,50,0.28);
  border: 1px solid rgba(0,214,50,0.5);
  backdrop-filter: blur(8px);
  padding: 3px 11px; border-radius: 999px;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
  margin: 0 0 18px;
}

.section-label {
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase; letter-spacing: .14em;
  margin-bottom: 11px;
}

/* Amount buttons */
.amounts-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 9px; }

.amt-btn {
  border: 1px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.95);
  border-radius: 12px; padding: 13px 0;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  font-family: 'Outfit', sans-serif;
  backdrop-filter: blur(8px);
  text-shadow: 0 1px 3px rgba(0,0,0,0.15);
}
.amt-btn:hover {
  background: rgba(255,255,255,0.28);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-1px);
}
.amt-btn.selected {
  border-color: #00D632;
  background: rgba(0,214,50,0.3);
  color: #fff;
  box-shadow: 0 0 0 1.5px rgba(0,214,50,0.5), 0 4px 12px rgba(0,214,50,0.25);
}

.show-more-btn {
  width: 100%;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.28);
  color: rgba(255,255,255,0.75);
  border-radius: 12px; padding: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  margin-bottom: 10px; font-family: 'Outfit', sans-serif;
  transition: all .15s;
  backdrop-filter: blur(8px);
}
.show-more-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* Custom input */
.custom-wrap { position: relative; margin-bottom: 18px; }
.custom-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: #00D632; font-size: 15px; font-weight: 700;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
}
.custom-input {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 12px; padding: 13px 14px 13px 34px;
  font-size: 15px; color: #fff; outline: none;
  font-family: 'Outfit', sans-serif;
  backdrop-filter: blur(8px);
}
.custom-input::placeholder { color: rgba(255,255,255,0.45); }
.custom-input:focus {
  border-color: #00D632;
  background: rgba(0,214,50,0.12);
  box-shadow: 0 0 0 2px rgba(0,214,50,0.2);
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* Pay button */
.pay-btn {
  width: 100%;
  background: linear-gradient(135deg, #00E635, #00C22E);
  color: white; border: none;
  border-radius: 16px; padding: 17px;
  font-size: 17px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  box-shadow:
    0 6px 28px rgba(0,214,50,0.45),
    0 1px 0 rgba(255,255,255,0.35) inset;
  transition: all .2s; font-family: 'Outfit', sans-serif;
  letter-spacing: .02em;
}
.pay-btn:hover {
  filter: brightness(1.06);
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0,214,50,0.55), 0 1px 0 rgba(255,255,255,0.3) inset;
}
.pay-btn:active { transform: translateY(0); }

.powered {
  text-align: center; padding: 13px 0 2px;
  color: rgba(255,255,255,0.5); font-size: 11px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.powered strong { color: rgba(255,255,255,0.7); }

/* ── STEP 2 ── */
#step2 { display: none; padding: 24px 22px 28px; text-align: center; }

.amount-due-label {
  font-size: 10px; color: rgba(255,255,255,0.6);
  text-transform: uppercase; letter-spacing: .14em; font-weight: 600;
}
.amount-due-val {
  font-family: 'Playfair Display', serif;
  font-size: 46px; font-weight: 800; color: #fff;
  margin: 4px 0;
  text-shadow: 0 2px 16px rgba(0,0,0,0.2);
}
.scan-tip { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }

.qr-wrap {
  background: white; border-radius: 20px; padding: 14px;
  display: inline-block;
  box-shadow: 0 4px 28px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.5) inset;
  position: relative; margin-bottom: 20px; cursor: pointer;
}
.qr-logo-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: white; padding: 4px; border-radius: 8px;
}
.qr-logo-inner {
  background: #00D632; width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: white;
}

.invoice-box {
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px; padding: 18px;
  backdrop-filter: blur(12px);
}
.timer-label { color: #4ade80; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .18em; }
.timer-val {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 800; color: #fff;
  letter-spacing: .08em; margin: 4px 0 14px;
}
.inv-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.12);
  font-size: 14px;
}
.inv-row:last-of-type { border-bottom: none; }
.inv-key { color: rgba(255,255,255,0.55); font-weight: 600; }

.status-badge {
  background: rgba(0,214,50,0.2);
  border: 1px solid rgba(0,214,50,0.4);
  color: #4ade80; padding: 4px 11px;
  border-radius: 999px; font-size: 10px; font-weight: 700;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
}
.status-dot { width: 5px; height: 5px; background: #00D632; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.pay-now-btn {
  width: 100%;
  background: linear-gradient(135deg, #00E635, #00C22E);
  color: white; border: none;
  border-radius: 14px; padding: 15px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 20px rgba(0,214,50,0.4),
              0 1px 0 rgba(255,255,255,0.3) inset;
  text-decoration: none; margin-top: 14px; position: relative;
  font-family: 'Outfit', sans-serif;
}
.copy-btn {
  width: 100%; margin-top: 12px; background: none; border: none;
  color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 600;
  cursor: pointer; text-decoration: underline;
  font-family: 'Outfit', sans-serif;
}

/* ── STEP 3 ── */
#step3 { display: none; padding: 44px 24px; text-align: center; }

@keyframes pop {
  0%  { transform:scale(0); opacity:0; }
  60% { transform:scale(1.18); }
  100%{ transform:scale(1); opacity:1; }
}
.success-icon {
  width: 84px; height: 84px;
  background: linear-gradient(135deg, #00E635, #00C22E);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 22px;
  box-shadow: 0 0 50px rgba(0,214,50,.55),
              0 1px 0 rgba(255,255,255,0.3) inset;
  animation: pop .5s ease forwards;
}
.success-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 6px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.2);
}
.success-sub { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 8px; }
.success-amount {
  font-family: 'Playfair Display', serif;
  font-size: 44px; font-weight: 800; color: #4ade80; margin-bottom: 26px;
  text-shadow: 0 2px 20px rgba(0,214,50,0.4);
}
.reload-btn {
  width: 100%;
  background: linear-gradient(135deg, #00E635, #00C22E);
  color: white; border: none;
  border-radius: 16px; padding: 17px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,214,50,.4);
  font-family: 'Outfit', sans-serif;
}
</style>
</head>
<body>

<div class="card">
  <div class="drag-bar"></div>

  <!-- ── STEP 1 ── -->
  <div id="step1" class="s1-body">

    <div class="profile-row">
      <div class="p-avatar">$</div>
      <div class="p-info">
        <div class="p-name">Pay Mila69</div>
        <div class="p-tag">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          Secure · Instant
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">Select Amount</div>

    <div class="amounts-grid">
      <button class="amt-btn selected" onclick="selectAmt(this,10)">$10</button>
      <button class="amt-btn" onclick="selectAmt(this,15)">$15</button>
      <button class="amt-btn" onclick="selectAmt(this,20)">$20</button>
    </div>

    <button class="show-more-btn" id="toggleBtn" onclick="toggleMore()">Show more amounts ▾</button>

    <div id="moreAmounts" style="display:none;">
      <div class="amounts-grid">
        <button class="amt-btn" onclick="selectAmt(this,25)">$25</button>
        <button class="amt-btn" onclick="selectAmt(this,50)">$50</button>
        <button class="amt-btn" onclick="selectAmt(this,75)">$75</button>
      </div>
      <div class="amounts-grid" style="margin-top:8px;">
        <button class="amt-btn" onclick="selectAmt(this,100)">$100</button>
        <button class="amt-btn" onclick="selectAmt(this,150)">$150</button>
        <button class="amt-btn" onclick="selectAmt(this,200)">$200</button>
      </div>
      <div class="amounts-grid" style="margin-top:8px; margin-bottom:8px;">
        <button class="amt-btn" onclick="selectAmt(this,250)">$250</button>
        <button class="amt-btn" onclick="selectAmt(this,300)">$300</button>
        <button class="amt-btn" style="visibility:hidden;"></button>
      </div>
    </div>

    <div class="custom-wrap">
      <span class="custom-icon">$</span>
      <input type="number" id="customInput" class="custom-input"
        placeholder="Custom amount" min="2" max="2000"
        oninput="onCustomInput(this)">
    </div>

    <button class="pay-btn" id="payBtn" onclick="submitPayment()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      Pay Now →
    </button>

    <div class="powered">
      <span style="width:13px;height:13px;border:1.5px solid rgba(255,255,255,0.3);border-radius:50%;display:inline-block;"></span>
      Powered by <strong>Cashapp</strong>
    </div>
  </div>

  <!-- ── STEP 2 ── -->
  <div id="step2">
    <div class="amount-due-label">Amount Due</div>
    <div class="amount-due-val">$<span id="displayAmount">0.00</span></div>
    <div class="scan-tip">Scan or tap to pay</div>

    <a id="qrLink" href="#" target="_blank">
      <div class="qr-wrap">
        <div id="qrcode"></div>
        <div class="qr-logo-overlay"><div class="qr-logo-inner">$</div></div>
      </div>
    </a>

    <div class="invoice-box">
      <div class="timer-label">⏱ Expires in</div>
      <div class="timer-val" id="timer">15 : 00</div>
      <div class="inv-row">
        <span class="inv-key">Invoice ID</span>
        <span id="invoiceIdDisplay">—</span>
      </div>
      <div class="inv-row">
        <span class="inv-key">Status</span>
        <span class="status-badge">
          <span class="status-dot"></span> Waiting
        </span>
      </div>
    </div>

    <a id="payNowBtn" href="#" target="_blank" class="pay-now-btn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      Pay Now
    </a>
    <button class="copy-btn" onclick="copyInvoice()">Copy Invoice Address</button>
  </div>

  <!-- ── STEP 3 ── -->
  <div id="step3">
    <div class="success-icon">
      <svg width="44" height="44" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <div class="success-title">Payment Received!</div>
    <div class="success-sub">Thank you for your payment</div>
    <div class="success-amount" id="successAmount">$0.00</div>
    <button class="reload-btn" onclick="location.reload()">Make Another Payment</button>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://your-supabase-url.supabase.co';
const SUPABASE_ANON_KEY = 'your-anon-key';

let selectedAmount = 10;
let timerInterval, pollInterval;
let currentLightningInvoice = '';

function selectAmt(btn, amt) {
  document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedAmount = amt;
  document.getElementById('customInput').value = '';
}

function toggleMore() {
  const more = document.getElementById('moreAmounts');
  const btn = document.getElementById('toggleBtn');
  if (more.style.display === 'none') {
    more.style.display = 'block';
    btn.textContent = 'Show less amounts ▴';
  } else {
    more.style.display = 'none';
    btn.textContent = 'Show more amounts ▾';
  }
}

function onCustomInput(input) {
  const val = parseFloat(input.value);
  if (val && val >= 2) {
    selectedAmount = val;
    document.querySelectorAll('.amt-btn').forEach(b => b.classList.remove('selected'));
  }
}

async function submitPayment() {
  if (!selectedAmount || selectedAmount < 2) {
    alert('Please select or enter an amount (min $2)'); return;
  }
  const btn = document.getElementById('payBtn');
  btn.textContent = 'Generating Invoice…';
  btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/btcpay-webhook`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ amount: selectedAmount, email: '', source: 'pay-cashapp.shop' })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    let rawCode = data.lightningCode;
    let bolt11  = rawCode.toLowerCase().startsWith('lightning:') ? rawCode.slice(10) : rawCode;
    let cashAppUrl = `https://cash.app/launch/lightning/${bolt11}`;
    currentLightningInvoice = bolt11;
    showStep2(data.amount, cashAppUrl, data.invoiceId);
  } catch(e) {
    alert('Error: ' + e.message);
    btn.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> Pay Now →`;
    btn.disabled = false;
  }
}
function showStep2(amount, cashAppUrl, invId) {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('displayAmount').textContent = parseFloat(amount).toFixed(2);
  let shortId = invId.substring(0,16).replace(/(.{4})/g,'$1-').slice(0,-1);
  document.getElementById('invoiceIdDisplay').textContent = shortId;
  document.getElementById('qrcode').innerHTML = '';
  new QRCode(document.getElementById('qrcode'), {
    text: cashAppUrl, width: 200, height: 200,
    colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('qrLink').href = cashAppUrl;
  document.getElementById('payNowBtn').href = cashAppUrl;
  startTimer(15 * 60);
  startPolling(invId, amount);
}
function startTimer(sec) {
  clearInterval(timerInterval);
  let t = sec;
  timerInterval = setInterval(() => {
    if (t <= 0) {
      clearInterval(timerInterval); clearInterval(pollInterval);
      document.getElementById('timer').textContent = '00 : 00'; return;
    }
    let m = Math.floor(t/60), s = t%60;
    document.getElementById('timer').textContent =
      String(m).padStart(2,'0') + ' : ' + String(s).padStart(2,'0');
    t--;
  }, 1000);
}
function startPolling(invoiceId, amount) {
  clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const res  = await fetch(
        `${SUPABASE_URL}/rest/v1/payments?invoice_id=eq.${invoiceId}&select=status`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const data = await res.json();
      if (data?.[0]?.status === 'settled') {
        clearInterval(pollInterval); clearInterval(timerInterval);
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        document.getElementById('successAmount').textContent = '$' + parseFloat(amount).toFixed(2);
      }
    } catch(e) {}
  }, 5000);
}
function copyInvoice() {
  navigator.clipboard.writeText(currentLightningInvoice);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = '✓ Copied!'; btn.style.color = '#4ade80';
  setTimeout(() => { btn.textContent = 'Copy Invoice Address'; btn.style.color = ''; }, 2000);
}
</script>
