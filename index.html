<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Cashapp - Crypto Payment Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #0b0e11; }
        .glass-card { background-color: #161a1e; border: 1px solid #2b2f36; }
        /* কাস্টম স্ক্রলবার হাইড করার জন্য */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-md rounded-3xl p-6 shadow-2xl relative">
        
        <div class="flex items-center justify-between mb-6">
            <div class="bg-[#00D632] w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-[#00D632]/20">
                $
            </div>
            
            <a href="YOUR_TELEGRAM_LINK_HERE" target="_blank" class="text-blue-500 hover:text-blue-400 font-medium text-sm underline decoration-blue-500/30 underline-offset-4">
                Join Telegram
            </a>
            
            <div class="flex items-center space-x-1 px-3 py-1.5 rounded-full border border-[#2b2f36] bg-[#1a1e24]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                </svg>
                <span class="text-xs text-gray-400 font-medium">Secure</span>
            </div>
        </div>

        <div class="text-center mb-6">
            <div class="bg-[#00D632] w-16 h-16 rounded-2xl mx-auto flex items-center justify-center text-white font-bold text-4xl mb-3 shadow-[0_0_20px_rgba(0,214,50,0.3)]">
                $
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Cash App</h1>
        </div>

        <div id="step1">
            <form id="paymentForm" class="space-y-5">
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider font-semibold">Email</label>
                    <input type="email" id="userEmail" placeholder="name@email.com" required class="w-full bg-[#2b2f36] border border-[#3b3f46] rounded-2xl p-3.5 focus:outline-none focus:border-[#00c853] transition-colors">
                </div>
                
                <div>
                    <label class="block text-xs text-gray-400 mb-1.5 uppercase tracking-wider font-semibold">Amount (USD)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-[#00c853] font-bold text-lg">$</span>
                        <input type="number" id="payAmount" value="10" min="2" max="2000" class="w-full bg-[#2b2f36] border border-[#3b3f46] rounded-2xl p-3.5 pl-9 text-lg font-medium focus:outline-none focus:border-[#00c853] transition-colors">
                    </div>
                    <p class="text-[11px] text-gray-500 mt-2 font-medium">Between 2 and 2,000 USD.</p>
                </div>

                <div>
                    <p class="text-xs text-gray-400 mb-3 font-semibold">Quick amounts</p>
                    
                    <div class="grid grid-cols-4 gap-2.5 mb-2.5">
                        <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$10</button>
                        <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$15</button>
                        <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$20</button>
                        <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$25</button>
                    </div>
                    
                    <div id="extraAmounts" class="hidden">
                        <div class="grid grid-cols-4 gap-2.5 mb-2.5">
                            <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$50</button>
                            <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$75</button>
                            <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$100</button>
                            <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$150</button>
                        </div>
                        <div class="grid grid-cols-4 gap-2.5">
                            <button type="button" class="quick-btn bg-[#2b2f36] border border-[#3b3f46] hover:border-[#00c853] text-gray-200 rounded-full py-2.5 text-sm font-semibold transition-all">$200</button>
                        </div>
                    </div>

                    <div class="text-center mt-3 border border-[#2b2f36] rounded-full py-2 cursor-pointer hover:bg-[#2b2f36] transition-colors" id="toggleAmountsBtn">
                        <span class="text-[#00c853] text-sm font-semibold underline decoration-[#00c853]/40 underline-offset-2">Fewer amounts</span>
                    </div>
                </div>

                <div class="flex justify-center items-center space-x-6 pt-2 pb-2">
                    <div class="flex items-center text-[#00D632] space-x-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        <span class="text-xs font-semibold">Secure</span>
                    </div>
                    <div class="flex items-center text-[#00D632] space-x-1.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        <span class="text-xs font-semibold">Instant</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#00D632] hover:bg-[#00c853] text-black font-bold py-4 rounded-full transition-all duration-300 flex items-center justify-center shadow-[0_0_15px_rgba(0,214,50,0.3)]">
                    Continue to payment <span class="ml-2 font-bold text-lg">→</span>
                </button>
            </form>
        </div>

        <div id="step2" class="hidden text-center space-y-5">
            
            <div class="flex bg-[#2b2f36] p-1.5 rounded-xl justify-between mb-2">
                <button type="button" onclick="switchMethod('lightning')" id="tab-lightning" class="flex-1 py-2 text-xs font-bold bg-[#00D632] text-black rounded-lg transition-all shadow-md">Lightning</button>
                <button type="button" onclick="switchMethod('binance')" id="tab-binance" class="flex-1 py-2 text-xs font-bold text-gray-400 hover:text-white rounded-lg transition-all">Binance Pay</button>
                <button type="button" onclick="switchMethod('usdt')" id="tab-usdt" class="flex-1 py-2 text-xs font-bold text-gray-400 hover:text-white rounded-lg transition-all">USDT (TRC20)</button>
            </div>

            <div class="space-y-1">
                <div class="inline-block bg-yellow-50 bg-opacity-10 px-3 py-1 rounded-full border border-yellow-500/20 mb-2">
                    <p class="text-[10px] text-yellow-200 uppercase tracking-wider font-semibold">Time Remaining <span id="timer" class="font-mono ml-1 text-sm">59:59</span></p>
                </div>
                <h3 class="text-gray-400 text-xs uppercase tracking-widest font-semibold">Amount Due</h3>
                <p class="text-4xl font-bold text-white">$<span id="displayAmount">0.00</span></p>
            </div>

            <div class="bg-white p-3 rounded-2xl inline-block mx-auto shadow-inner">
                <div id="qrcode"></div>
            </div>

            <div class="text-left space-y-3 bg-[#0b0e11] p-4 rounded-xl text-sm border border-[#2b2f36]">
                <div class="flex justify-between items-center">
                    <span class="text-gray-500 text-xs font-semibold">Status</span>
                    <span class="text-yellow-500 text-[10px] font-bold uppercase tracking-widest animate-pulse flex items-center"><span class="w-1.5 h-1.5 bg-yellow-500 rounded-full mr-1.5"></span> Awaiting</span>
                </div>
                
                <div class="flex flex-col">
                    <span class="text-gray-500 mb-1.5 text-xs font-semibold" id="dynamicLabel">Lightning Address</span>
                    <div class="flex space-x-2">
                        <input type="text" id="dynamicValue" readonly class="w-full font-mono text-[11px] text-gray-300 bg-[#161a1e] p-2.5 rounded-lg border border-[#2b2f36] focus:outline-none" value="lnbc129370n...">
                        <button onclick="copyData()" class="bg-[#2b2f36] hover:bg-[#3b3f46] text-[#00D632] px-3 rounded-lg text-xs font-bold transition-colors border border-[#3b3f46]">Copy</button>
                    </div>
                </div>
            </div>

            <button onclick="location.reload()" class="w-full text-gray-400 hover:text-white py-2 text-xs font-semibold transition-colors underline decoration-gray-600 underline-offset-4">Cancel Payment & Go Back</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('paymentForm');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const amountInput = document.getElementById('payAmount');
        let qrCodeObj = null;

        // --- Demo Data for Different Crypto Networks ---
        const paymentData = {
            lightning: {
                address: "lnbc129370n2500000000000000000000000000000000000000",
                label: "Lightning Invoice"
            },
            binance: {
                address: "123456789 (Binance Pay ID)", // Replace with real Binance Pay ID
                label: "Binance Pay ID"
            },
            usdt: {
                address: "TRXWALLETADDRESSGOTOYOURBINANCETRC20", // Replace with real USDT TRC20 Address
                label: "USDT (TRC20) Address"
            }
        };

        // Quick Amounts Setup
        const quickBtns = document.querySelectorAll('.quick-btn');
        quickBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                amountInput.value = btn.innerText.replace('$', '');
            });
        });

        // Toggle More/Fewer Amounts
        const toggleBtn = document.getElementById('toggleAmountsBtn');
        const extraAmounts = document.getElementById('extraAmounts');
        extraAmounts.classList.remove('hidden'); // Show by default as per screenshot
        
        toggleBtn.addEventListener('click', () => {
            extraAmounts.classList.toggle('hidden');
            if(extraAmounts.classList.contains('hidden')) {
                toggleBtn.innerHTML = '<span class="text-[#00c853] text-sm font-semibold underline decoration-[#00c853]/40 underline-offset-2">More amounts</span>';
            } else {
                toggleBtn.innerHTML = '<span class="text-[#00c853] text-sm font-semibold underline decoration-[#00c853]/40 underline-offset-2">Fewer amounts</span>';
            }
        });

        // Form Submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            step1.classList.add('hidden');
            step2.classList.remove('hidden');
            document.getElementById('displayAmount').innerText = parseFloat(amountInput.value).toFixed(2);
            switchMethod('lightning'); // Default to Lightning
            startTimer();
        });

        // Switch Crypto Payment Method Tab Logic
        function switchMethod(method) {
            // Update Tab Styling
            ['lightning', 'binance', 'usdt'].forEach(m => {
                const tab = document.getElementById(`tab-${m}`);
                if (m === method) {
                    tab.className = "flex-1 py-2 text-xs font-bold bg-[#00D632] text-black rounded-lg transition-all shadow-md";
                } else {
                    tab.className = "flex-1 py-2 text-xs font-bold text-gray-400 hover:text-white rounded-lg transition-all";
                }
            });

            // Update Labels and Inputs
            document.getElementById('dynamicLabel').innerText = paymentData[method].label;
            document.getElementById('dynamicValue').value = paymentData[method].address;

            // Generate/Update QR Code
            generateQR(paymentData[method].address);
        }

        // QR Generation Function
        function generateQR(textData) {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; // Clear existing QR
            qrCodeObj = new QRCode(qrContainer, {
                text: textData,
                width: 170,
                height: 170,
                colorDark : "#000000",
                colorLight : "#ffffff"
            });
        }

        // Copy to Clipboard
        function copyData() {
            const copyText = document.getElementById("dynamicValue");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            
            // Visual feedback on copy button
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.classList.replace("text-[#00D632]", "text-white");
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace("text-white", "text-[#00D632]");
            }, 2000);
        }

        // Timer
        function startTimer() {
            let time = 3600;
            const timerEl = document.getElementById('timer');
            const countdown = setInterval(() => {
                if(time <= 0 || step1.offsetParent !== null) clearInterval(countdown);
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                time--;
            }, 1000);
        }
    </script>
</body>
</html>
