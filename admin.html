<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Unified</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --surface: #0e1117;
  --card: #131720;
  --border: #1e2433;
  --border2: #252d3d;
  --green: #00d632;
  --green-dim: rgba(0,214,50,0.12);
  --green-glow: rgba(0,214,50,0.3);
  --text: #e8eaf0;
  --muted: #6b7490;
  --muted2: #3d4560;
  --red: #ff4757;
  --yellow: #ffd32a;
  --blue: #3d8ef8;
  --mono: 'DM Mono', monospace;
  --display: 'Syne', sans-serif;
  --body: 'DM Sans', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--body); min-height:100vh; overflow-x:hidden; }

/* ===== LOGIN ===== */
#loginScreen {
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,214,50,0.08) 0%, transparent 60%);
}
.login-box {
  width:100%; max-width:380px; background:var(--surface); border:1px solid var(--border2);
  border-radius:20px; padding:36px 28px; position:relative; overflow:hidden;
}
.login-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--green), transparent);
}
.login-logo {
  width:52px; height:52px; background:var(--green); border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--display); font-size:24px; font-weight:800; color:#000;
  margin:0 auto 24px; box-shadow:0 0 30px var(--green-glow);
}
.login-title { font-family:var(--display); font-size:22px; font-weight:700; text-align:center; margin-bottom:6px; }
.login-sub { color:var(--muted); font-size:13px; text-align:center; margin-bottom:28px; }
.field-label { font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; display:block; }
.field-input {
  width:100%; background:#0a0d13; border:1px solid var(--border2); border-radius:10px;
  padding:12px 14px; color:var(--text); font-family:var(--mono); font-size:14px;
  outline:none; transition:border .2s;
}
.field-input:focus { border-color:var(--green); }
.login-btn {
  width:100%; background:var(--green); border:none; border-radius:10px;
  padding:13px; font-family:var(--display); font-size:15px; font-weight:700;
  color:#000; cursor:pointer; transition:all .2s; margin-top:8px;
  box-shadow:0 0 20px var(--green-glow);
}
.login-error { color:var(--red); font-size:12px; text-align:center; margin-top:12px; display:none; }

/* ===== ADMIN SCREEN ===== */
#adminScreen { display:none; padding: 20px; max-width: 1200px; margin: 0 auto; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.page-title { font-family: var(--display); font-size: 24px; font-weight: 800; }

.filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 15px;
    align-items: center;
    flex-wrap: wrap;
}
.filter-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
select {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
    font-family: var(--mono);
    font-size: 13px;
}

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
}
.stat-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--green); opacity:.6; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-family: var(--display); font-size: 24px; font-weight: 800; color: var(--green); }

.table-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-family: var(--display); font-size: 15px; }
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
th { padding: 12px 20px; text-align: left; font-size: 10px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); font-family: var(--mono); }
td { padding: 14px 20px; font-size: 13px; border-bottom: 1px solid var(--border); }
tr:hover td { background: rgba(255,255,255,0.02); }

.badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; font-family: var(--mono); }
.badge-settled { background: rgba(0,214,50,0.12); color: var(--green); }
.badge-new { background: rgba(61,142,248,0.12); color: var(--blue); }
.badge-site { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }

.refresh-btn { background: var(--green); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: var(--display); }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--red); padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <div class="login-logo">$</div>
            <h1 class="login-title">Admin Access</h1>
            <p class="login-sub">Secure Dashboard Login</p>
            <div class="field-wrap">
                <span class="field-label">Password</span>
                <input type="password" id="passwordInput" class="field-input" placeholder="Enter admin password">
            </div>
            <button class="login-btn" onclick="doLogin()">Sign In →</button>
            <p id="loginError" class="login-error">Incorrect password. Try again.</p>
        </div>
    </div>

    <!-- ADMIN SCREEN -->
    <div id="adminScreen">
        <div class="header">
            <h1 class="page-title">Unified Dashboard</h1>
            <div style="display: flex; gap: 10px;">
                <button class="refresh-btn" onclick="loadData()">Refresh</button>
                <button class="logout-btn" onclick="doLogout()">Logout</button>
            </div>
        </div>

        <div class="filter-bar">
            <span class="filter-label">Filter Site:</span>
            <select id="siteFilter" onchange="filterData()">
                <option value="all">All Sites</option>
            </select>
            
            <span class="filter-label" style="margin-left: 15px;">Status:</span>
            <select id="statusFilter" onchange="filterData()">
                <option value="all">All Status</option>
                <option value="settled">Settled</option>
                <option value="new">Pending</option>
            </select>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-value" id="stat-revenue">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Payments</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Settled</div>
                <div class="stat-value" id="stat-settled">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Sites</div>
                <div class="stat-value" id="stat-sites">0</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">Recent Transactions</div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Source</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Invoice ID</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://pbxpdppibnmtyxfoyydr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBieHBkcHBpYm5tdHl4Zm95eWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzY5MjgsImV4cCI6MjA5MzU1MjkyOH0.iRtrUJImt_Wvhc4dSITge_o09jrvc6jbYNM9K2413lo";
        const ADMIN_PASS = localStorage.getItem('admin_pass') || 'mila69';

        let allPayments = [];

        function doLogin() {
            const val = document.getElementById('passwordInput').value;
            if (val === ADMIN_PASS) {
                sessionStorage.setItem('admin_auth', '1');
                showDashboard();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function doLogout() {
            sessionStorage.removeItem('admin_auth');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminScreen').style.display = 'block';
            loadData();
        }

        if (sessionStorage.getItem('admin_auth') === '1') {
            showDashboard();
        }

        async function loadData() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/payments?select=*&order=created_at.desc`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
                });
                allPayments = await res.json();
                updateSiteFilter();
                filterData();
            } catch (e) { console.error(e); }
        }

        function updateSiteFilter() {
            const select = document.getElementById('siteFilter');
            const currentVal = select.value;
            const sites = [...new Set(allPayments.map(p => p.source || 'site1'))];
            select.innerHTML = '<option value="all">All Sites</option>';
            sites.forEach(site => {
                const opt = document.createElement('option');
                opt.value = site;
                opt.textContent = site;
                select.appendChild(opt);
            });
            select.value = currentVal;
        }

        function filterData() {
            const site = document.getElementById('siteFilter').value;
            const status = document.getElementById('statusFilter').value;
            let filtered = allPayments;
            if (site !== 'all') filtered = filtered.filter(p => (p.source || 'site1') === site);
            if (status !== 'all') filtered = filtered.filter(p => p.status === status);
            renderData(filtered);
            updateStats(filtered);
        }

        function updateStats(data) {
            const settled = data.filter(p => p.status === 'settled');
            const revenue = settled.reduce((a, p) => a + parseFloat(p.amount || 0), 0);
            const sites = [...new Set(data.map(p => p.source || 'site1'))].length;
            document.getElementById('stat-revenue').textContent = '$' + revenue.toFixed(2);
            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-settled').textContent = settled.length;
            document.getElementById('stat-sites').textContent = sites;
        }

        function renderData(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td style="font-family: var(--mono); font-size: 11px;">${new Date(p.created_at).toLocaleString()}</td>
                    <td><span class="badge badge-site">${p.source || 'site1'}</span></td>
                    <td><strong style="color: var(--green);">$${parseFloat(p.amount || 0).toFixed(2)}</strong></td>
                    <td><span class="badge badge-${p.status === 'settled' ? 'settled' : 'new'}">${p.status}</span></td>
                    <td style="font-family: var(--mono); font-size: 10px; color: var(--muted);">${p.invoice_id.substring(0,12)}...</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
