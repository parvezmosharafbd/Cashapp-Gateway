<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmed!</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300D632'/><text x='50' y='72' font-size='65' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'>$</text></svg>" type="image/svg+xml">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { background-color: #0b0e11; }
        .glass-card { background-color: #161a1e; border: 1px solid #2b2f36; }
        @keyframes checkmark {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .checkmark-anim { animation: checkmark 0.6s ease forwards; }
        .fade-up { animation: fadeUp 0.6s ease forwards; }
        .fade-up-delay { animation: fadeUp 0.6s ease 0.2s forwards; opacity: 0; }
        .fade-up-delay2 { animation: fadeUp 0.6s ease 0.4s forwards; opacity: 0; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-[#161a1e] px-6 py-5 border-b border-[#2b2f36]">
            <div class="grid grid-cols-3 items-center">
                <div class="bg-[#00D632] w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(0,214,50,0.3)] justify-self-start">$</div>
                <div class="text-center justify-self-center col-span-1">
                    <a href="https://t.me/+IamJaVRoMBI0NDI9" target="_blank" class="text-blue-500 hover:text-blue-400 font-semibold text-[13px] transition-colors underline decoration-blue-500/30 underline-offset-4">
                        Join Telegram
                    </a>
                </div>
                <div class="flex items-center space-x-1.5 px-3 py-1.5 rounded-full border border-[#2b2f36] bg-[#1a1e24] justify-self-end">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" /></svg>
                    <span class="text-xs text-gray-400 font-medium">Secure</span>
                </div>
            </div>
        </div>

        <!-- Success Content -->
        <div class="p-8 text-center">

            <!-- Checkmark -->
            <div class="checkmark-anim w-24 h-24 bg-[#00D632] rounded-full mx-auto flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(0,214,50,0.4)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <div class="fade-up">
                <h1 class="text-2xl font-bold mb-2">Payment Confirmed!</h1>
                <p class="text-gray-400 text-sm mb-6">Your payment has been received successfully.</p>
            </div>

            <!-- Info Box -->
            <div class="fade-up-delay bg-[#1a1e24] border border-[#2b2f36] rounded-2xl p-5 mb-6 text-left">
                <div class="flex justify-between items-center py-3 border-b border-[#2b2f36]">
                    <span class="text-gray-400 text-sm font-semibold">Status</span>
                    <span class="bg-[#e6f9ed] text-[#00D632] px-3 py-1 rounded-full text-[10px] font-bold uppercase flex items-center tracking-wider">
                        <span class="w-1.5 h-1.5 bg-[#00D632] rounded-full mr-1.5"></span> Confirmed
                    </span>
                </div>
                <div class="flex justify-between items-center py-3">
                    <span class="text-gray-400 text-sm font-semibold">Network</span>
                    <span class="text-white text-sm font-bold">⚡ Lightning</span>
                </div>
            </div>

            <!-- Buttons -->
            <div class="fade-up-delay2 space-y-3">
                <a href="https://t.me/+IamJaVRoMBI0NDI9" target="_blank" class="w-full bg-[#00D632] hover:bg-[#00c853] text-black font-bold py-4 rounded-full transition-all duration-300 flex items-center justify-center shadow-[0_0_15px_rgba(0,214,50,0.3)]">
                    Join Telegram →
                </a>
                <a href="/" class="w-full block text-center text-gray-400 hover:text-white text-xs font-semibold transition-colors underline decoration-gray-600 underline-offset-4 mt-3">
                    Make another payment
                </a>
            </div>

        </div>
    </div>

</body>
</html>
